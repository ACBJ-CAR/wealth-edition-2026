repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      # - id: check-yaml
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
  - repo: local
    hooks:
      - id: jupytext-sync-start
        name: jupytext-sync-start
        entry: uv run jupytext --sync
        language: system
        files: ^.*\.ipynb$|.*\.py$
        pass_filenames: true
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix --force-exclude
        language: system
        types_or: [python, jupyter]
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format --force-exclude
        language: system
        types_or: [python, jupyter]
      - id: jupytext-sync-end
        name: jupytext-sync-end
        entry: uv run jupytext --sync
        language: system
        files: ^.*\.ipynb$|.*\.py$
        pass_filenames: true
